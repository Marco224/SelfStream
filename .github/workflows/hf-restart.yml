name: Hugging Face Space Factory Rebuild

on:
  schedule:
    # Esegue la ricompilazione ogni giorno alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  rebuild-space:
    runs-on: ubuntu-latest
    steps:
      - name: Installa Python e HuggingFace Hub
        run: |
          pip install huggingface_hub

      - name: Ricompila (Factory Rebuild) lo Spazio Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          
          # Parametri dello spazio
          repo_id = 'Marco224/SelfStream'
          token = os.getenv('HF_TOKEN')
          
          if not token:
              print('ERRORE: Token HF_TOKEN non trovato nei Secret di GitHub!')
              exit(1)
              
          api = HfApi(token=token)
          try:
              # Ecco la modifica: factory_rebuild=True
              api.restart_space(repo_id=repo_id, factory_rebuild=True)
              print(f'Successo: Segnale di Factory Rebuild inviato a {repo_id}')
          except Exception as e:
              print(f'Errore durante la ricompilazione: {e}')
              exit(1)
          "
